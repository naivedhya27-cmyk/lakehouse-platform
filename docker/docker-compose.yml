version: '3.9'

# LakehousePlatform - Full Stack Docker Compose
# Open-source Databricks alternative

networks:
  lakehouse:
    driver: bridge

volumes:
  minio_data:
  postgres_data:
  mlflow_data:
  jupyter_data:
  trino_data:
  kafka_data:
  zookeeper_data:

services:
  # ============================================================
  # Core API (FastAPI)
  # ============================================================
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfiles/api.Dockerfile
    container_name: lakehouse-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://lakehouse:lakehouse@postgres:5432/lakehouse
      - REDIS_URL=redis://redis:6379
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=lakehouse
      - MINIO_SECRET_KEY=lakehouse123
      - AWS_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=lakehouse
      - AWS_SECRET_ACCESS_KEY=lakehouse123
      - AWS_REGION=us-east-1
      - TRINO_HOST=trino
      - TRINO_PORT=8080
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - KEYCLOAK_URL=http://keycloak:8080
      - SECRET_KEY=changeme-in-production-use-strong-key
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lakehouse
    restart: unless-stopped
    volumes:
      - ../api:/app/api
      - ../compute:/app/compute
      - ../storage:/app/storage
      - ../sql:/app/sql
      - ../ml:/app/ml

  # ============================================================
  # Frontend (React)
  # ============================================================
  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfiles/frontend.Dockerfile
    container_name: lakehouse-ui
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - REACT_APP_MLFLOW_URL=http://localhost:5000
    networks:
      - lakehouse
    restart: unless-stopped

  # ============================================================
  # PostgreSQL (metadata store)
  # ============================================================
  postgres:
    image: postgres:15-alpine
    container_name: lakehouse-postgres
    environment:
      POSTGRES_DB: lakehouse
      POSTGRES_USER: lakehouse
      POSTGRES_PASSWORD: lakehouse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - lakehouse
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lakehouse"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================================
  # Redis (caching + job queue)
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: lakehouse-redis
    ports:
      - "6379:6379"
    networks:
      - lakehouse
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================================
  # MinIO (S3-compatible object storage for Delta Lake)
  # ============================================================
  minio:
    image: minio/minio:latest
    container_name: lakehouse-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: lakehouse
      MINIO_ROOT_PASSWORD: lakehouse123
    volumes:
      - minio_data:/data
    networks:
      - lakehouse
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # MinIO bucket initialization
  minio-init:
    image: minio/mc:latest
    container_name: lakehouse-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - lakehouse
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 lakehouse lakehouse123;
      /usr/bin/mc mb myminio/lakehouse-data --ignore-existing;
      /usr/bin/mc mb myminio/lakehouse-logs --ignore-existing;
      /usr/bin/mc mb myminio/mlflow-artifacts --ignore-existing;
      echo 'MinIO buckets initialized';
      "

  # ============================================================
  # Apache Spark (Standalone mode for local dev)
  # ============================================================
  spark-master:
    image: bitnami/spark:3.5
    container_name: lakehouse-spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=spark-master
      - SPARK_EXTRA_CLASSPATH=/opt/bitnami/spark/jars/delta-spark_2.12-3.2.0.jar
    ports:
      - "7077:7077"
      - "8081:8080"
    networks:
      - lakehouse
    restart: unless-stopped

  spark-worker:
    image: bitnami/spark:3.5
    container_name: lakehouse-spark-worker
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=4G
      - SPARK_WORKER_CORES=4
      - SPARK_EXTRA_CLASSPATH=/opt/bitnami/spark/jars/delta-spark_2.12-3.2.0.jar
    depends_on:
      - spark-master
    networks:
      - lakehouse
    restart: unless-stopped

  # ============================================================
  # Trino (SQL Analytics - Federated queries)
  # ============================================================
  trino:
    image: trinodb/trino:435
    container_name: lakehouse-trino
    ports:
      - "8080:8080"
    volumes:
      - ../sql/trino_config/etc:/etc/trino
    networks:
      - lakehouse
    restart: unless-stopped

  # ============================================================
  # JupyterHub (Notebook service)
  # ============================================================
  jupyter:
    image: jupyter/pyspark-notebook:latest
    container_name: lakehouse-jupyter
    ports:
      - "8888:8888"
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - GRANT_SUDO=yes
      - SPARK_MASTER=spark://spark-master:7077
      - AWS_ACCESS_KEY_ID=lakehouse
      - AWS_SECRET_ACCESS_KEY=lakehouse123
      - AWS_ENDPOINT_URL=http://minio:9000
    volumes:
      - jupyter_data:/home/jovyan/work
      - ../notebooks:/home/jovyan/notebooks
    depends_on:
      - spark-master
    networks:
      - lakehouse
    restart: unless-stopped

  # ============================================================
  # MLflow (ML experiment tracking and model registry)
  # ============================================================
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.0
    container_name: lakehouse-mlflow
    command: >
      mlflow server
      --backend-store-uri postgresql://lakehouse:lakehouse@postgres:5432/mlflow
      --default-artifact-root s3://mlflow-artifacts/
      --host 0.0.0.0
      --port 5000
    ports:
      - "5000:5000"
    environment:
      - AWS_ACCESS_KEY_ID=lakehouse
      - AWS_SECRET_ACCESS_KEY=lakehouse123
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - lakehouse
    restart: unless-stopped

  # ============================================================
  # Apache Kafka (Streaming)
  # ============================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: lakehouse-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - lakehouse
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: lakehouse-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - lakehouse
    restart: unless-stopped

  # ============================================================
  # Keycloak (Authentication & RBAC)
  # ============================================================
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: lakehouse-keycloak
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: lakehouse
      KC_DB_PASSWORD: lakehouse
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lakehouse
    restart: unless-stopped

  # ============================================================
  # Prometheus + Grafana (Monitoring)
  # ============================================================
  prometheus:
    image: prom/prometheus:v2.49.0
    container_name: lakehouse-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - lakehouse
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.2.0
    container_name: lakehouse-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - lakehouse
    restart: unless-stopped
