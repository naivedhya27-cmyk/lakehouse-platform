global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'lakehouse-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: /metrics

  - job_name: 'spark-master'
    static_configs:
      - targets: ['spark-master:8080']

  - job_name: 'trino'
    static_configs:
      - targets: ['trino:8080']
    metrics_path: /v1/status

  - job_name: 'mlflow'
    static_configs:
      - targets: ['mlflow:5000']

  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:9092']
