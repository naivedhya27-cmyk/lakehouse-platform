# Apache Spark Configuration for LakehousePlatform
# Optimized for Kubernetes deployment with Delta Lake

# Cluster Settings
spark.master                          k8s://https://kubernetes.default.svc
spark.submit.deployMode               cluster
spark.kubernetes.namespace            lakehouse-compute
spark.kubernetes.container.image      ghcr.io/lakehouse-platform/spark:3.5.0
spark.kubernetes.authenticate.driver.serviceAccountName  spark

# Delta Lake Configuration
spark.sql.extensions                  io.delta.sql.DeltaSparkSessionExtension
spark.sql.catalog.spark_catalog       org.apache.spark.sql.delta.catalog.DeltaCatalog
spark.databricks.delta.retentionDurationCheck.enabled  false

# Performance Tuning
spark.sql.adaptive.enabled            true
spark.sql.adaptive.coalescePartitions.enabled  true
spark.sql.adaptive.skewJoin.enabled   true
spark.sql.shuffle.partitions          200
spark.default.parallelism             200

# Memory Configuration
spark.driver.memory                   4g
spark.driver.memoryOverhead           1g
spark.executor.memory                 8g
spark.executor.memoryOverhead         2g
spark.executor.cores                  4
spark.executor.instances              2

# Dynamic Allocation
spark.dynamicAllocation.enabled       true
spark.dynamicAllocation.minExecutors  1
spark.dynamicAllocation.maxExecutors  20
spark.dynamicAllocation.initialExecutors  2
spark.dynamicAllocation.executorIdleTimeout  120s
spark.dynamicAllocation.shuffleTracking.enabled  true

# Object Storage (S3/MinIO)
spark.hadoop.fs.s3a.impl              org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.aws.credentials.provider  com.amazonaws.auth.DefaultAWSCredentialsProviderChain
spark.hadoop.fs.s3a.path.style.access true
spark.hadoop.fs.s3a.connection.ssl.enabled  false

# Kubernetes Pod Templates
spark.kubernetes.driver.label.app     lakehouse-platform
spark.kubernetes.driver.label.component  spark-driver
spark.kubernetes.executor.label.app   lakehouse-platform
spark.kubernetes.executor.label.component  spark-executor

# Spark on K8s - Resource Management
spark.kubernetes.driver.request.cores    2
spark.kubernetes.driver.limit.cores      4
spark.kubernetes.executor.request.cores  2
spark.kubernetes.executor.limit.cores    4

# Spark UI
spark.ui.port                         4040
spark.ui.reverseProxy                 true

# Event Logging
spark.eventLog.enabled                true
spark.eventLog.dir                    s3a://lakehouse-logs/spark-events
spark.eventLog.compress               true

# Security
spark.authenticate                    true
spark.network.crypto.enabled          true
