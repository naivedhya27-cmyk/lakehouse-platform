apiVersion: v1
kind: ConfigMap
metadata:
  name: lakehouse-config
  namespace: lakehouse
  labels:
    app: lakehouse-platform
data:
  APP_NAME: "LakehousePlatform"
  APP_VERSION: "1.0.0"
  STORAGE_TYPE: "s3"
  STORAGE_ROOT: "s3://lakehouse-data"
  AWS_REGION: "us-east-1"
  TRINO_HOST: "lakehouse-trino"
  TRINO_PORT: "8080"
  MLFLOW_TRACKING_URI: "http://lakehouse-mlflow:5000"
  KAFKA_BOOTSTRAP_SERVERS: "lakehouse-kafka:9092"
  KEYCLOAK_URL: "http://lakehouse-keycloak:8080"
  KEYCLOAK_REALM: "lakehouse"
  KEYCLOAK_CLIENT_ID: "lakehouse-api"
  SPARK_NAMESPACE: "lakehouse-compute"
  CORS_ORIGINS: '["https://lakehouse.example.com"]'
  ENABLE_METRICS: "true"
