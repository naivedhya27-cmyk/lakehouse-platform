apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "lakehouse.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lakehouse.labels" . | nindent 4 }}
  {{- if eq .Values.global.storage.type "gcs" }}
  annotations:
    iam.gke.io/gcp-service-account: {{ .Values.global.gcpServiceAccount | default "lakehouse-platform@PROJECT.iam.gserviceaccount.com" }}
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "lakehouse.fullname" . }}-spark-manager
  labels:
    {{- include "lakehouse.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["sparkoperator.k8s.io"]
    resources: ["sparkapplications", "sparkapplications/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "lakehouse.fullname" . }}-spark-manager
  labels:
    {{- include "lakehouse.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "lakehouse.fullname" . }}-spark-manager
subjects:
  - kind: ServiceAccount
    name: {{ include "lakehouse.fullname" . }}
    namespace: {{ .Release.Namespace }}
